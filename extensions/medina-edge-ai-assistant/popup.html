<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Medina Edge AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; width: 360px; padding: 16px; background: #0a0a0a; color: #d4af37; }
        h1 { font-size: 14px; margin: 0 0 4px 0; color: #ffd700; }
        h2 { font-size: 11px; margin: 0 0 12px 0; color: #b8860b; font-style: italic; }
        .status { padding: 8px; border: 1px solid #333; border-radius: 4px; background: #111; margin-bottom: 8px; }
        .status .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .status .value { font-size: 13px; color: #ffd700; }
        .phi { color: #d4af37; font-weight: bold; }
        .adapters { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .adapter { font-size: 10px; background: #161616; border: 1px solid #2a2a2a; border-radius: 4px; padding: 6px; }
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        button { background: #202020; color: #ffd700; border: 1px solid #444; border-radius: 4px; padding: 6px 10px; font-size: 11px; cursor: pointer; }
        button:hover { border-color: #777; }
        .footer { font-size: 9px; color: #555; margin-top: 12px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>
    <h1>Medina Edge AI Assistant</h1>
    <h2>ASSISTENS INTELLIGENTIAE ORAE</h2>

    <div class="status">
        <div class="label">Status</div>
        <div class="value" id="status">Checking...</div>
    </div>

    <div class="status">
        <div class="label">Frequency</div>
        <div class="value"><span class="phi">φ</span> = 1.618033988749895 Hz</div>
    </div>

    <div class="status">
        <div class="label">Offline Queue</div>
        <div class="value" id="queue">0</div>
    </div>

    <div class="adapters" id="adapters"></div>

    <div class="controls">
        <button id="toggleOffline">Enable Offline</button>
        <button id="syncNow">Sync Now</button>
    </div>

    <div class="footer">MEDINA Sovereign Extension • ISIL-1.0 • Phases I-V + Offline</div>
    <script src="popup.js"></script>
</body>
</html>
