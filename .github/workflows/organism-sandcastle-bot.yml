# ═══════════════════════════════════════════════════════════════════════════
# 🏰 ORGANISM SANDCASTLE BOT — ARENARIUM ORGANISMI
# "Ante terram tangas, proba." (Before you touch the ground, prove.)
#
# Division II — Validate & Test
# Sandboxed build-test-land pipeline: runs full validation on every push
# and PR in isolation. Nothing lands until sandcastle passes.
#
# Attribution: Alfredo Medina Hernandez | Medina Tech | Dallas, TX
# ═══════════════════════════════════════════════════════════════════════════

name: 🏰 organism-sandcastle-bot

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sandcastle:
    name: 🏰 Sandcastle Build-Test-Land
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Phase 1 — Build Gate
        id: build
        run: |
          echo "🏰 Phase 1: Build Gate"
          PASS=0
          FAIL=0

          # Validate all JS syntax
          for f in $(find organism-cli/web -name '*.js' 2>/dev/null); do
            if node -c "$f" 2>/dev/null; then
              PASS=$((PASS + 1))
            else
              echo "  ✗ $f — syntax error"
              FAIL=$((FAIL + 1))
            fi
          done
          echo "  ✓ $PASS JS files valid, $FAIL failed"

          # Validate all JSON
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null); do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              PASS=$((PASS + 1))
            else
              echo "  ✗ $f — invalid JSON"
              FAIL=$((FAIL + 1))
            fi
          done

          if [ $FAIL -gt 0 ]; then
            echo "build_status=FAIL" >> "$GITHUB_OUTPUT"
            echo "  🏰 Build Gate: FAIL ($FAIL errors)"
          else
            echo "build_status=PASS" >> "$GITHUB_OUTPUT"
            echo "  🏰 Build Gate: PASS"
          fi

      - name: Phase 2 — Test Gate
        id: test
        run: |
          echo "🏰 Phase 2: Test Gate"

          # Validate Motoko module structure
          MO_PASS=0
          MO_FAIL=0
          for f in icp/src/medina_backend/*.mo; do
            if grep -qE '(module|actor)' "$f" 2>/dev/null; then
              MO_PASS=$((MO_PASS + 1))
            else
              echo "  ✗ $(basename $f) — missing module/actor"
              MO_FAIL=$((MO_FAIL + 1))
            fi
          done
          echo "  ✓ $MO_PASS/$((MO_PASS + MO_FAIL)) Motoko engines valid"

          # Validate dfx.json
          if python3 -c "import json; json.load(open('icp/dfx.json'))" 2>/dev/null; then
            echo "  ✓ dfx.json valid"
          else
            echo "  ✗ dfx.json invalid"
            MO_FAIL=$((MO_FAIL + 1))
          fi

          if [ $MO_FAIL -gt 0 ]; then
            echo "test_status=FAIL" >> "$GITHUB_OUTPUT"
          else
            echo "test_status=PASS" >> "$GITHUB_OUTPUT"
          fi
          echo "  🏰 Test Gate: $([ $MO_FAIL -eq 0 ] && echo PASS || echo FAIL)"

      - name: Phase 3 — Security Gate
        id: security
        run: |
          echo "🏰 Phase 3: Security Gate"
          ISSUES=0

          # Quick secret scan
          if grep -rn --include='*.js' -E 'AKIA[0-9A-Z]{16}' . 2>/dev/null | grep -v node_modules | grep -qv '.git'; then
            echo "  ✗ AWS key pattern detected"
            ISSUES=$((ISSUES + 1))
          else
            echo "  ✓ No AWS key patterns"
          fi

          # Check for eval()
          EVAL_COUNT=$(grep -rn 'eval(' organism-cli/web/*.js 2>/dev/null | grep -v '// ' | grep -v 'evaluate' | wc -l || echo 0)
          if [ "$EVAL_COUNT" -gt 0 ]; then
            echo "  ⚠ $EVAL_COUNT eval() usages found"
          else
            echo "  ✓ No eval() in web workers"
          fi

          echo "security_issues=$ISSUES" >> "$GITHUB_OUTPUT"
          echo "  🏰 Security Gate: $([ $ISSUES -eq 0 ] && echo PASS || echo FAIL)"

      - name: Sandcastle Verdict
        run: |
          BUILD="${{ steps.build.outputs.build_status }}"
          TEST="${{ steps.test.outputs.test_status }}"
          SEC_ISSUES="${{ steps.security.outputs.security_issues }}"

          echo ""
          echo "🏰 ═══════════════════════════════════"
          echo "🏰  SANDCASTLE VERDICT"
          echo "🏰 ═══════════════════════════════════"
          echo "🏰  Build Gate:    $BUILD"
          echo "🏰  Test Gate:     $TEST"
          echo "🏰  Security Gate: $([ "$SEC_ISSUES" = "0" ] && echo PASS || echo FAIL)"
          echo "🏰 ═══════════════════════════════════"

          if [ "$BUILD" = "PASS" ] && [ "$TEST" = "PASS" ] && [ "$SEC_ISSUES" = "0" ]; then
            echo "🏰 ✅ LAND APPROVED — All gates pass"
          else
            echo "🏰 ❌ LAND BLOCKED — Review failures above"
            # Don't hard-fail here — report only (sandcastle advises, not blocks)
          fi

      - name: Generate Sandcastle Report
        run: |
          mkdir -p build/sandcastle
          echo "# 🏰 Sandcastle Report" > build/sandcastle/sandcastle-report.md
          echo "" >> build/sandcastle/sandcastle-report.md
          echo "**Run:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> build/sandcastle/sandcastle-report.md
          echo "**Commit:** \`${GITHUB_SHA:0:7}\`" >> build/sandcastle/sandcastle-report.md
          echo "**Event:** ${{ github.event_name }}" >> build/sandcastle/sandcastle-report.md
          echo "" >> build/sandcastle/sandcastle-report.md
          echo "## Phase Results" >> build/sandcastle/sandcastle-report.md
          echo "" >> build/sandcastle/sandcastle-report.md
          echo "| Phase | Status |" >> build/sandcastle/sandcastle-report.md
          echo "|-------|--------|" >> build/sandcastle/sandcastle-report.md
          echo "| 🏗️ Build Gate | ${{ steps.build.outputs.build_status }} |" >> build/sandcastle/sandcastle-report.md
          echo "| 🧪 Test Gate | ${{ steps.test.outputs.test_status }} |" >> build/sandcastle/sandcastle-report.md
          echo "| 🛡️ Security Gate | $([ '${{ steps.security.outputs.security_issues }}' = '0' ] && echo PASS || echo FAIL) |" >> build/sandcastle/sandcastle-report.md
          cat build/sandcastle/sandcastle-report.md
