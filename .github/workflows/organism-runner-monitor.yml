# ═══════════════════════════════════════════════════════════════════════════
# ORGANISM RUNNER MONITOR — Runner Health Check Workflow
# Monitors self-hosted runner health and reports status
#
# House: Infrastructure tier  |  Law: L-005 (always-on, not alive)
# Attribution: Alfredo Medina Hernandez | Medina Tech | Dallas, TX
# ═══════════════════════════════════════════════════════════════════════════

name: "🏃 organism-runner-monitor"

on:
  schedule:
    # Every 6 hours
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  monitor:
    name: "🏃 Runner Health Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check runner status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "╔═══════════════════════════════════════════════╗"
          echo "║   MEDINA RUNNER SYSTEM — Health Check         ║"
          echo "║   φ = 1.618033988749895                       ║"
          echo "╚═══════════════════════════════════════════════╝"
          echo ""

          # List all runners for this repo
          if RUNNERS=$(gh api /repos/${{ github.repository }}/actions/runners \
            --jq '.runners[]? | [.name, .status, ([.labels[].name] | join(", "))] | @tsv' 2>/dev/null); then
            if [ -z "$RUNNERS" ]; then
              echo "  ⚠️  No self-hosted runners configured"
              echo "  → Set up runners: .github/runner-system/README.md"
            else
              COUNT=$(printf '%s\n' "$RUNNERS" | wc -l | tr -d ' ')
              echo "  Runners found: $COUNT"
              echo ""
              while IFS=$'\t' read -r name status labels; do
                [ -z "$name" ] && continue
                indicator="🔴"
                [ "$status" = "online" ] && indicator="🟢"
                printf '  %s %s (%s) — [%s]\n' "$indicator" "$name" "$status" "$labels"
              done <<< "$RUNNERS"
            fi
          else
            echo "  ⚠️  Unable to query runner status"
            echo "  → Check repository Actions permissions or GitHub CLI access"
          fi
          echo ""
          echo "  φ = 1.618033988749895"

      - name: Check workflow bot health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "═══ Bot Fleet Workflow Status ═══"
          echo ""

          WORKFLOWS=("organism-protocol-bot" "organism-test-bot" "organism-build-bot" \
                     "organism-docs-bot" "organism-deps-bot" "organism-neural-bot" \
                     "custos-guardian" "medicus-autofix" "fasciculus-package" \
                     "praetor-orchestrate" "memoria-index-bot" "memoria-compress-bot" \
                     "memoria-recall-bot")

          for wf in "${WORKFLOWS[@]}"; do
            STATUS=$(gh run list --workflow "${wf}.yml" --limit 1 --json conclusion,status \
              --jq 'if length > 0 then (.[0].conclusion // .[0].status // "unknown") else "no_runs" end' \
              2>/dev/null || echo "error")
            ICON="✓"
            [ "$STATUS" = "failure" ] && ICON="✗"
            [ "$STATUS" = "no_runs" ] && ICON="○"
            printf "  %s %-30s %s\n" "$ICON" "$wf" "$STATUS"
          done

      - name: BotProofRecord
        if: always()
        run: |
          echo "┌─ BotProofRecord ─────────────────────────────────────────────┐"
          echo "│ id:          RUNNER-MONITOR                                  │"
          echo "│ role:        runner-health-check                              │"
          echo "│ law:         L-005 — Always-on, not alive                   │"
          echo "│ run_id:      ${{ github.run_id }}"
          echo "│ sha:         ${{ github.sha }}"
          echo "└───────────────────────────────────────────────────────────────┘"
