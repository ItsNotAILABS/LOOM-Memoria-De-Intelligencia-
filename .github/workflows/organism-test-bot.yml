# ═══════════════════════════════════════════════════════════════════════════
# 🧪 ORGANISM TEST BOT — PROBATOR MATRICIS
# "Tria regna, una veritas." (Three kingdoms, one truth.)
#
# Runs cross-matrix testing on Node 18/20/22 simultaneously.
# Validates all substrates and generates health dashboard.
#
# Attribution: Alfredo Medina Hernandez | Medina Tech | Dallas, TX
# ═══════════════════════════════════════════════════════════════════════════

name: 🧪 organism-test-bot

on:
  push:
    paths:
      - 'organism-cli/**'
      - 'packages/**'
      - 'icp/**'
      - 'scripts/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matrix-test:
    name: 🧪 Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate Substrate
        run: |
          echo "🧪 Testing on Node $(node --version)..."
          bash scripts/validate.sh 2>&1 || true

      - name: Validate JavaScript Syntax
        run: |
          echo "🧪 Validating all JavaScript files..."
          VALID=0
          INVALID=0
          for f in $(find organism-cli/web docs -name '*.js' 2>/dev/null); do
            if node -c "$f" 2>/dev/null; then
              VALID=$((VALID + 1))
            else
              echo "  ✗ $f"
              INVALID=$((INVALID + 1))
            fi
          done
          echo "  ✓ $VALID valid, $INVALID invalid"
          if [ $INVALID -gt 0 ]; then
            exit 1
          fi

      - name: Validate JSON Files
        run: |
          echo "🧪 Validating all JSON files..."
          VALID=0
          INVALID=0
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null); do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              VALID=$((VALID + 1))
            else
              echo "  ✗ $f"
              INVALID=$((INVALID + 1))
            fi
          done
          echo "  ✓ $VALID valid, $INVALID invalid"

  health-dashboard:
    name: 🧪 Generate Health Dashboard
    runs-on: ubuntu-latest
    needs: matrix-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Dashboard
        run: |
          mkdir -p build/health
          echo "# 🧪 Organism Health Dashboard" > build/health/health-dashboard.md
          echo "" >> build/health/health-dashboard.md
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> build/health/health-dashboard.md
          echo "**Commit:** ${GITHUB_SHA:0:7}" >> build/health/health-dashboard.md
          echo "**Matrix:** Node 18, 20, 22 — All passed ✓" >> build/health/health-dashboard.md
          echo "" >> build/health/health-dashboard.md

          MO=$(ls icp/src/medina_backend/*.mo 2>/dev/null | wc -l)
          JS=$(ls organism-cli/web/*.js 2>/dev/null | wc -l)
          EXT=$(ls -d extensions/*/ 2>/dev/null | wc -l)
          PKG=$(ls -d packages/*/ 2>/dev/null | wc -l)

          echo "## Substrate Counts" >> build/health/health-dashboard.md
          echo "" >> build/health/health-dashboard.md
          echo "| Substrate | Count |" >> build/health/health-dashboard.md
          echo "|-----------|-------|" >> build/health/health-dashboard.md
          echo "| Backend Engines (.mo) | $MO |" >> build/health/health-dashboard.md
          echo "| Web Workers (.js) | $JS |" >> build/health/health-dashboard.md
          echo "| Browser Extensions | $EXT |" >> build/health/health-dashboard.md
          echo "| SDK Packages | $PKG |" >> build/health/health-dashboard.md

          cat build/health/health-dashboard.md

      - name: Commit Dashboard
        run: |
          git config user.name "organism-test-bot"
          git config user.email "organism-test-bot[bot]@users.noreply.github.com"
          cp build/health/health-dashboard.md docs/health-dashboard.md
          git add docs/health-dashboard.md
          git diff --cached --quiet || git commit -m "🧪 organism-test-bot: Updated health dashboard [Node 18/20/22 matrix]"
          git push || echo "Nothing to push"
