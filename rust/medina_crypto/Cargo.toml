[lib]
name = "medina_crypto"
crate-type = ["cdylib", "rlib"]

[dependencies]
sha2 = "0.10"
blake3 = "1.5"
hex = "0.4"
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }

[features]
default = []
wasm = ["wasm-bindgen", "js-sys"]

[profile.release]
opt-level = 3
lto = true
