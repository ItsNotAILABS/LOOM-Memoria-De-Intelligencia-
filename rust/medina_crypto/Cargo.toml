[package]
name = "medina_crypto"
version = "1.0.0"
edition = "2021"
authors = ["Alfredo Medina Hernandez <medinasiftech@outlook.com>"]
description = "MEDINA Cryptography Layer - φ-native hash primitives and ANIMA chain encryption"
license = "Proprietary"
repository = "https://github.com/FreddyCreates/Medina-Memory-More-AI"

