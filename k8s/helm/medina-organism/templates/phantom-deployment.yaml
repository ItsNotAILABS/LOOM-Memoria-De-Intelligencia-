## ═══════════════════════════════════════════════════════════════════════════════════════════════
## PHANTOM AGENTS DEPLOYMENT (One deployment per agent)
## ═══════════════════════════════════════════════════════════════════════════════════════════════
{{- if and .Values.phantom.enabled .Values.phantom.agents.enabled }}
{{- range .Values.phantom.agents.specs }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "medina-organism.fullname" $ }}-phantom-agent-{{ .name | lower }}
  labels:
    {{- include "medina-organism.labels" $ | nindent 4 }}
    component: phantom-agent
    agent: {{ .name | lower }}
    medina.tech/frequency: "{{ .frequency }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "medina-organism.selectorLabels" $ | nindent 6 }}
      component: phantom-agent
      agent: {{ .name | lower }}
  template:
    metadata:
      labels:
        {{- include "medina-organism.selectorLabels" $ | nindent 8 }}
        component: phantom-agent
        agent: {{ .name | lower }}
    spec:
      containers:
        - name: phantom-agent
          image: "medina/phantom-agent:2.8.0"
          env:
            - name: AGENT_NAME
              value: "{{ .name }}"
            - name: AGENT_FREQUENCY
              value: "{{ .frequency }}"
            - name: AGENT_ROLE
              value: "{{ .role }}"
            - name: PHI
              value: "{{ $.Values.constants.phi }}"
          resources:
            {{- toYaml $.Values.phantom.agents.resources | nindent 12 }}
---
{{- end }}
{{- end }}
