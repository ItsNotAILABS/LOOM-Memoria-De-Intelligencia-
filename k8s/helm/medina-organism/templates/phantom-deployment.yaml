##
## ╔══════════════════════════════════════════════════════════════════════════════════════════════╗
## ║                    PHANTOM INFRASTRUCTURE — KUBERNETES TEMPLATES                             ║
## ╚══════════════════════════════════════════════════════════════════════════════════════════════╝
##

## ═══════════════════════════════════════════════════════════════════════════════════════════════
## PHANTOM MEMORY DEPLOYMENT
## ═══════════════════════════════════════════════════════════════════════════════════════════════
{{- if and .Values.phantom.enabled .Values.phantom.memory.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "medina-organism.fullname" . }}-phantom-memory
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
    component: phantom-memory
    medina.tech/frequency: "{{ .Values.phantom.memory.frequency }}"
spec:
  replicas: {{ .Values.phantom.memory.replicaCount }}
  selector:
    matchLabels:
      {{- include "medina-organism.selectorLabels" . | nindent 6 }}
      component: phantom-memory
  template:
    metadata:
      labels:
        {{- include "medina-organism.selectorLabels" . | nindent 8 }}
        component: phantom-memory
    spec:
      containers:
        - name: phantom-memory
          image: "{{ .Values.phantom.memory.image.repository }}:{{ .Values.phantom.memory.image.tag }}"
          env:
            - name: PHI
              value: "{{ .Values.constants.phi }}"
            - name: FREQUENCY
              value: "{{ .Values.phantom.memory.frequency }}"
            - name: PROTOCOL
              value: "{{ .Values.phantom.memory.protocol }}"
          resources:
            {{- toYaml .Values.phantom.memory.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "medina-organism.fullname" . }}-phantom-memory
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    {{- include "medina-organism.selectorLabels" . | nindent 4 }}
    component: phantom-memory
{{- end }}

---
