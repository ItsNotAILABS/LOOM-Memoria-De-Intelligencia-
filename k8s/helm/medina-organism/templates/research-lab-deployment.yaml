##
## ╔══════════════════════════════════════════════════════════════════════════════════════════════╗
## ║                    RESEARCH LAB DEPLOYMENT — KUBERNETES TEMPLATE                             ║
## ╚══════════════════════════════════════════════════════════════════════════════════════════════╝
##
{{- if .Values.researchLab.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "medina-organism.fullname" . }}-research-lab
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
    component: research-lab
    medina.tech/frequency: "{{ .Values.researchLab.frequency }}"
    medina.tech/protocol: "{{ .Values.researchLab.protocol }}"
spec:
  serviceName: {{ include "medina-organism.fullname" . }}-research-lab
  replicas: {{ .Values.researchLab.replicaCount }}
  selector:
    matchLabels:
      {{- include "medina-organism.selectorLabels" . | nindent 6 }}
      component: research-lab
  template:
    metadata:
      labels:
        {{- include "medina-organism.selectorLabels" . | nindent 8 }}
        component: research-lab
    spec:
      containers:
        - name: research-lab
          image: "{{ .Values.researchLab.image.repository }}:{{ .Values.researchLab.image.tag }}"
          imagePullPolicy: {{ .Values.researchLab.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PHI
              value: "{{ .Values.constants.phi }}"
            - name: LAB_NAME
              value: "{{ .Values.researchLab.name }}"
            - name: LAB_FREQUENCY
              value: "{{ .Values.researchLab.frequency }}"
            - name: RESEARCHER_COUNT
              value: "{{ .Values.researchLab.researchers.count }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.researchLab.resources | nindent 12 }}
          volumeMounts:
            - name: papers-data
              mountPath: /data/papers
            - name: research-data
              mountPath: /data/research
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
  {{- if .Values.researchLab.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: papers-data
      spec:
        accessModes: [ "{{ .Values.researchLab.persistence.accessMode }}" ]
        {{- if .Values.researchLab.persistence.storageClass }}
        storageClassName: {{ .Values.researchLab.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.researchLab.persistence.size }}
    - metadata:
        name: research-data
      spec:
        accessModes: [ "{{ .Values.researchLab.persistence.accessMode }}" ]
        {{- if .Values.researchLab.persistence.storageClass }}
        storageClassName: {{ .Values.researchLab.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.researchLab.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "medina-organism.fullname" . }}-research-lab
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
    component: research-lab
spec:
  type: {{ .Values.researchLab.service.type }}
  ports:
    - port: {{ .Values.researchLab.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "medina-organism.selectorLabels" . | nindent 4 }}
    component: research-lab
{{- end }}
