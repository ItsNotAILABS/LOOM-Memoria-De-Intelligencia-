##
## ╔══════════════════════════════════════════════════════════════════════════════════════════════╗
## ║                    ORGANISM CORE DEPLOYMENT — KUBERNETES TEMPLATE                            ║
## ╚══════════════════════════════════════════════════════════════════════════════════════════════╝
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "medina-organism.fullname" . }}-core
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
    component: organism-core
    medina.tech/frequency: "{{ .Values.organism.frequency }}"
    medina.tech/protocol: "{{ .Values.organism.protocol }}"
spec:
  replicas: {{ .Values.organism.replicaCount }}
  selector:
    matchLabels:
      {{- include "medina-organism.selectorLabels" . | nindent 6 }}
      component: organism-core
  template:
    metadata:
      labels:
        {{- include "medina-organism.selectorLabels" . | nindent 8 }}
        component: organism-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: organism-core
          image: "{{ .Values.organism.image.repository }}:{{ .Values.organism.image.tag }}"
          imagePullPolicy: {{ .Values.organism.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PHI
              value: "{{ .Values.constants.phi }}"
            - name: SCHUMANN
              value: "{{ .Values.constants.schumann }}"
            - name: ORGANISM_NAME
              value: "{{ .Values.organism.name }}"
            - name: ORGANISM_FREQUENCY
              value: "{{ .Values.organism.frequency }}"
            - name: ORGANISM_PROTOCOL
              value: "{{ .Values.organism.protocol }}"
            - name: ORGANISM_MODE
              value: "kubernetes"
            - name: LOG_LEVEL
              value: "{{ .Values.organism.env.LOG_LEVEL }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.organism.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "medina-organism.fullname" . }}-core
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
    component: organism-core
spec:
  type: {{ .Values.organism.service.type }}
  ports:
    - port: {{ .Values.organism.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "medina-organism.selectorLabels" . | nindent 4 }}
    component: organism-core
{{- if .Values.organism.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "medina-organism.fullname" . }}-core
  labels:
    {{- include "medina-organism.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "medina-organism.fullname" . }}-core
  minReplicas: {{ .Values.organism.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.organism.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.organism.autoscaling.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.organism.autoscaling.targetMemoryUtilization }}
{{- end }}
