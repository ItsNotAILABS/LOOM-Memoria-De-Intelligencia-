<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="TEMPLUM MEMORIAE — Memory Temple Progressive Web App">
  
  <!-- PWA Meta -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  
  <!-- Frequency Signature -->
  <meta name="medina:frequency" content="122.991">
  <meta name="medina:protocol" content="PROT-410">
  <meta name="medina:phi" content="1.6180339887498948482">
  
  <title>TEMPLUM MEMORIAE</title>
  
  <style>
    :root {
      --phi: 1.6180339887498948482;
      --schumann: 7.83;
      --frequency: 122.991;
      
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --accent-gold: #c9a55c;
      --accent-purple: #8b5cf6;
      --text-primary: #e5e5e5;
      --text-secondary: #888;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .temple-header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--accent-gold);
      padding: 1rem;
      text-align: center;
    }
    
    .temple-title {
      font-size: 1.5rem;
      color: var(--accent-gold);
      letter-spacing: 0.2em;
    }
    
    .frequency-display {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    
    .temple-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    
    .memory-torus {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .torus-visualization {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 2px solid var(--accent-purple);
      position: relative;
      animation: pulse calc(1s / var(--phi)) ease-in-out infinite alternate;
    }
    
    @keyframes pulse {
      0% { opacity: 0.7; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .ring {
      position: absolute;
      border: 1px solid var(--accent-gold);
      border-radius: 50%;
      opacity: 0.3;
    }
    
    .memory-node {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--accent-gold);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .memory-node:hover {
      transform: scale(2);
      background: var(--accent-purple);
    }
    
    .controls {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--accent-gold);
    }
    
    .btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }
    
    .status-bar {
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
    
    .offline-indicator {
      color: #ef4444;
    }
    
    .online-indicator {
      color: #22c55e;
    }
  </style>
</head>
<body>
  <header class="temple-header">
    <h1 class="temple-title">TEMPLUM MEMORIAE</h1>
    <div class="frequency-display">
      φ¹⁰ = <span id="frequency">122.991</span> Hz | Ring <span id="ring">0</span> | Beat <span id="beat">0</span>
    </div>
  </header>
  
  <main class="temple-main">
    <div class="memory-torus">
      <div class="torus-visualization" id="torus">
        <!-- Rings and memory nodes will be generated by JS -->
      </div>
    </div>
  </main>
  
  <div class="controls">
    <button class="btn" id="recall-btn">RECALL</button>
    <button class="btn" id="store-btn">STORE</button>
    <button class="btn" id="traverse-btn">TRAVERSE</button>
    <button class="btn" id="sync-btn">SYNC</button>
  </div>
  
  <footer class="status-bar">
    <span id="status">Initializing Temple...</span>
    <span id="connection-status" class="offline-indicator">●  OFFLINE</span>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
